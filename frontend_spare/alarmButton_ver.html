<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 수정 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ku-crimson: #8A1538;
            --crimson-hover: #6b0f2a;
            --text-dark: #222222;
            --bg-gray: #EDF0F3;
            --card-white: #FFFFFF;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #EAECEF;
            --danger-color: #E53935;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text-main);
            padding-top: 100px;
            min-height: 100vh;
        }

        /* ==========================================
           mypage.html과 동일한 헤더 CSS
           ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        /* ========================================== */

        .container {
            max-width: 600px;
            margin: 0 auto 60px auto;
            padding: 0 20px;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .card {
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"],
        input[type="password"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            background-color: #fafafa;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--ku-crimson);
            background-color: white;
        }

        input:disabled {
            background-color: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .helper-text {
            font-size: 0.8rem;
            color: var(--ku-crimson);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .helper-text.info {
            color: var(--text-sub);
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--ku-crimson);
            color: white;
        }

        .btn-primary:hover { background-color: var(--crimson-hover); }

        .btn-danger {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            width: 100%;
        }

        .btn-danger:hover {
            background-color: #FFEBEE;
        }

        /* 알림 설정용 스위치 */
        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .toggle-item:last-child { border: none; }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--ku-crimson); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <h1 class="page-title">프로필 설정</h1>

        <div class="card">
            <h2 class="section-title">기본 정보</h2>
            
            <div class="form-group">
                <label>학교 이메일 (인증됨)</label>
                <input type="text" id="user-email" value="loading..." disabled>
            </div>

            <div class="form-group">
                <label>닉네임</label>
                <div class="input-row">
                    <input type="text" id="user-nickname" placeholder="새로운 닉네임 입력">
                    <button class="btn btn-primary" onclick="updateNickname()">변경하기</button>
                </div>
                <div class="helper-text">⚠️ 참여 중인 공구가 있을 경우 닉네임 변경이 제한됩니다.</div>
            </div>
        </div>

        <div class="card">
            <h2 class="section-title">비밀번호 변경</h2>
            <div class="form-group">
                <label>현재 비밀번호</label>
                <input type="password" placeholder="현재 비밀번호 입력">
            </div>
            <div class="form-group">
                <label>새 비밀번호</label>
                <input type="password" placeholder="새 비밀번호 입력">
            </div>
            <div class="form-group">
                <label>새 비밀번호 확인</label>
                <input type="password" placeholder="새 비밀번호 다시 입력">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="updatePassword()">비밀번호 변경</button>
        </div>

        <div class="card">
            <h2 class="section-title">알림 설정</h2>
            <div class="toggle-item">
                <span>채팅 및 서비스 알림</span>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
            <div class="toggle-item">
                <span>공구 상태 변경 알림</span>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
        </div>

        <div class="card" style="margin-bottom: 80px;">
            <h2 class="section-title" style="color: var(--danger-color); border-bottom-color: #FFEBEE;">위험 구역</h2>
            <p style="font-size: 0.9rem; color: var(--text-sub); margin-bottom: 15px; line-height: 1.5;">
                탈퇴 시 모든 데이터가 삭제되며 복구할 수 없습니다.<br>
                진행 중인 공구가 있다면 정산 완료 후 탈퇴가 가능합니다.
            </p>
            <button class="btn btn-danger" onclick="deleteAccount()">회원 탈퇴</button>
        </div>

    </div>

    <script>
        // 1. mypage.html과 동일한 헤더 호출 방식
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html을 찾을 수 없습니다.');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader();
            })
            .catch(err => console.error(err));

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                location.href = 'login.html'; // 비로그인 시 튕겨내기
            }
        }

        // 초기 데이터 로드
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-email').value = localStorage.getItem('userEmail') || '';
            document.getElementById('user-nickname').value = localStorage.getItem('userNickname') || '';
        });

        // 닉네임 업데이트 (예시)
        function updateNickname() {
            const newNick = document.getElementById('user-nickname').value;
            if(!newNick) return alert("닉네임을 입력하세요.");
            localStorage.setItem('userNickname', newNick);
            alert("닉네임이 성공적으로 변경되었습니다.");
        }

        // 비밀번호 업데이트 (예시)
        function updatePassword() {
            alert("비밀번호가 변경되었습니다. 보안을 위해 다시 로그인해주세요.");
            localStorage.clear();
            location.href = 'login.html';
        }

        // 회원 탈퇴 (예시)
        function deleteAccount() {
            if(confirm("정말로 탈퇴하시겠습니까? 활동 내역이 모두 삭제됩니다.")) {
                alert("탈퇴 처리가 완료되었습니다.");
                localStorage.clear();
                location.href = 'main_login.html';
            }
        }
    </script>
</body>
</html>
