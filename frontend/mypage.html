<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지</title>
  <link rel="stylesheet" href="style_mypage.css">
</head>
<body>

  <header class="header">
    <div class="logo">Campus Gonggu</div>
    <a href="main_display.html" class="home-link">메인으로</a>
  </header>

  <main class="container">

    <section class="profile-card">
      <div>
        <h1 id="nickname">홍길동</h1>
        <p id="user-email">email@example.com</p>
        <p class="school-badge">학교 인증 완료</p>
      </div>

      <div class="trust-score">
        <span>신뢰 점수</span>
        <strong>92점</strong>
      </div>
    </section>

    <script>
      const userData = localStorage.getItem('loggedInUser');
      const nicknameEl = document.getElementById('nickname');
      const emailEl = document.getElementById('user-email');

      if (!userData) {
        nicknameEl.textContent = '로그인이 필요합니다.';
        emailEl.textContent = '로그인 후 마이페이지를 이용해주세요.';
      } else {
        const user = JSON.parse(userData);
        nicknameEl.textContent = user.nickname || '사용자';
        emailEl.textContent = user.email || '';
      }
    </script>

    <section class="list-section">
      <h2>참여한 공동구매</h2>

      <div class="gonggu-list">
        <article class="gonggu-card">
          <h3>과자 공동구매</h3>
          <p>참여 인원: 3/5명</p>
          <span>오늘 마감</span>
        </article>

        <article class="gonggu-card">
          <h3>생수 묶음 구매</h3>
          <p>참여 인원: 2/4명</p>
          <span>내일 마감</span>
        </article>
      </div>
    </section>

    <section class="list-section">
      <h2>작성한 공동구매</h2>

      <div class="gonggu-list">
        <article class="gonggu-card">
          <h3>배달 공동주문</h3>
          <p>참여 인원: 1/3명</p>
          <span>오늘 밤 마감</span>
        </article>

        <article class="gonggu-card">
          <h3>프린트 용지 공동구매</h3>
          <p>참여 인원: 4/6명</p>
          <span>모집 중</span>
        </article>
      </div>
    </section>

  </main>

</body>
</html>
