<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU - 검색 결과</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-burgundy: #8A1538; 
            --bg-light-gray: #F8F9FA; 
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);

            /* 카테고리 버튼 색상 */
            --color-food: #FFF3E0;
            --color-living: #E3F2FD;
            --color-study: #E8F5E9;
            --color-etc: #F3E5F5;
            
            /* 헤더용 변수 추가 */
            --ku-crimson: #8A1538;
            --text-dark: #222222;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0 auto;
            background-color: #fff;
            color: #333;
            line-height: 1.6;
        }

        /* ==========================================
           ✅ 마이페이지와 완벽히 동일한 헤더 CSS 추가
           ========================================== */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-inner {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a.menu-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a.menu-link:hover {
            color: var(--text-dark);
        }

        .btn-login-nav {
            background: var(--ku-crimson);
            color: white !important;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.3);
            border: 2px solid white;
            cursor: pointer;
        }

        .btn-login-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(138, 21, 56, 0.4);
        }
        /* ========================================== */

        /* 대형 검색창 섹션 */
        .search-hero {
            background-color: var(--bg-light-gray);
            /* 고정 헤더 70px를 고려하여 상단 패딩 늘림 */
            padding: 120px 60px 80px; 
            text-align: center;
        }

        .search-box-wrapper {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }

        .search-box-wrapper input {
            width: 100%;
            padding: 22px 35px;
            font-size: 18px;
            border: none;
            border-radius: 40px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .search-box-wrapper input:focus {
            box-shadow: 0 4px 25px rgba(138, 21, 56, 0.15);
        }

        /* 카테고리 필터 버튼 영역 */
        .category-filter-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap; 
        }

        .filter-btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-size: 15px;
            font-weight: 500; 
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .filter-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
        }

        .btn-food { background-color: var(--color-food); }
        .btn-living { background-color: var(--color-living); }
        .btn-study { background-color: var(--color-study); }
        .btn-etc { background-color: var(--color-etc); }

        /* 메인 콘텐츠 컨테이너 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .result-info {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .result-info span {
            color: var(--main-burgundy);
        }

        /* 상품 그리드 레이아웃 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* 상품 카드 디자인 */
        .product-card {
            background: #fff;
            border-radius: 24px; 
            border: 1px solid #f0f0f0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--card-shadow);
            border-color: var(--main-burgundy);
        }

        .img-area {
            width: 100%;
            height: 220px;
            background-color: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .card-body {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .category-tag {
            font-size: 14px;
            font-weight: 700;
            color: #999;
            margin-bottom: 10px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #222;
            word-break: keep-all;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #f9f9f9;
        }

        .price {
            font-size: 20px;
            font-weight: 900;
            color: #000;
        }

        .badge {
            background-color: #FFF0F3;
            color: var(--main-burgundy);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<section class="search-hero">
    <div class="search-box-wrapper">
        <input type="text" id="main-search" placeholder="어떤 물품을 찾고 계신가요? (ex. 아이패드)">
    </div>
    
    <div class="category-filter-row" id="category-buttons">
        <button class="filter-btn btn-food" onclick="filterCategory('식재료 / 배달')">🍊 식재료 / 배달</button>
        <button class="filter-btn btn-living" onclick="filterCategory('자취 / 생필품')">🧴 자취 / 생필품</button>
        <button class="filter-btn btn-study" onclick="filterCategory('전공 / 문구')">📚 전공 / 문구</button>
        <button class="filter-btn btn-etc" onclick="filterCategory('기타 물품')">📦 기타 물품</button>
    </div>
</section>

<script>
    // 페이지 로드 시 URL을 확인하여 카테고리 버튼 숨기기 처리
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('category')) {
            const btnArea = document.getElementById('category-buttons');
            if (btnArea) btnArea.style.display = 'none';
        }
    });

    // 헤더 불러오기 및 렌더링
    fetch('header.html')
        .then(res => {
            if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
            return res.text();
        })
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
            updateHeader(); 
        })
        .catch(err => console.error(err));

    function updateHeader() {
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        const authElements = document.querySelectorAll('.auth-only');
        const guestElements = document.querySelectorAll('.guest-only');

        if (isLoggedIn) {
            authElements.forEach(el => el.style.display = 'inline-block');
            guestElements.forEach(el => el.style.display = 'none');
        } else {
            authElements.forEach(el => el.style.display = 'none');
            guestElements.forEach(el => el.style.display = 'inline-block');
        }
    }

    // 카테고리 이동 함수
    function filterCategory(categoryName) {
        location.href = `product_list.html?category=${encodeURIComponent(categoryName)}`;
    }

    // 검색창 엔터키 처리
    const searchInput = document.getElementById('main-search');
    if(searchInput) {
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const keyword = searchInput.value.trim();
                if (!keyword) return;
                location.href = `product_list.html?search=${encodeURIComponent(keyword)}`;
            }
        });
    }

    // 로그아웃 처리
    document.addEventListener('click', function(e) {
        const logoutBtn = e.target.closest('#logout-btn');
        if(logoutBtn) {
            localStorage.removeItem('isLoggedIn');
            alert('로그아웃 되었습니다.');
            location.href = 'main_login.html'; 
        }
    });
</script>

<main class="container">
    <div id="resultText" class="result-info" style="display: none;"></div>
    <div id="roomGrid" class="product-grid">
        </div>
</main>

<script src="script.js"></script>

</body>
</html>
