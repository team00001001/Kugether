<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KU GONGGU - 검색 결과</title>

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/product_list.css">

    <link rel="stylesheet" href="css_mobile/product_list_mobile.css" media="(max-width: 768px)">
</head>

<body>

    <div id="header-placeholder"></div>

    <section class="search-hero">
        <div class="search-box-wrapper">
            <input type="text" id="main-search" class="custom-search-input" placeholder="어떤 물품을 찾고 계신가요?">
            
            <button id="search-btn" type="button" class="search-btn-custom">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <div class="category-filter-row" id="category-buttons">
            <button class="filter-btn btn-food" onclick="filterCategory('식재료 / 배달')">🍊 식재료 / 배달</button>
            <button class="filter-btn btn-living" onclick="filterCategory('자취 / 생필품')">🧴 자취 / 생필품</button>
            <button class="filter-btn btn-study" onclick="filterCategory('전공 / 문구')">📚 전공 / 문구</button>
            <button class="filter-btn btn-etc" onclick="filterCategory('기타 물품')">📦 기타 물품</button>
            <button class="filter-btn" onclick="clearCategory()" style="background-color: #eee;">🏠 전체</button>
        </div>
    </section>

    <main class="container">
        <!-- 검색 결과 문구 영역 -->
        <div id="resultText" class="result-info" style="display: none; margin-bottom: 20px"></div>

        <!-- 열 선택 버튼 -->
        <div class="cols-selector">
            <span class="cols-label">보기</span>
            <!-- 모바일 전용 (1열) -->
            <button class="col-btn mobile-only" data-cols="1" onclick="setGridCols(1)">1열</button>
            <!-- 공통 (2·3열) -->
            <button class="col-btn" data-cols="2" onclick="setGridCols(2)">2열</button>
            <button class="col-btn" data-cols="3" onclick="setGridCols(3)">3열</button>
            <!-- 데스크톱 전용 (4·6열) -->
            <button class="col-btn desktop-only" data-cols="4" onclick="setGridCols(4)">4열</button>
            <button class="col-btn desktop-only" data-cols="6" onclick="setGridCols(6)">6열</button>
        </div>

        <!-- 3. 공구방 카드 리스트 영역 -->
        <div id="roomGrid" class="product-grid cols-3"></div>

        <!-- 4. 더보기 버튼 영역 -->
        <div id="loadMoreArea" style="text-align: center; margin-top: 40px; display: none;">
            <button id="loadMoreBtn"
                style="padding: 12px 40px; border-radius: 30px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: 700; transition: all 0.2s;">
                더보기 ▾
            </button>
        </div>
    </main>

    <script>
        // [함수] 카테고리 및 검색 해제 (전체보기)
        function clearCategory() {
            location.href = 'product_list.html';
        }

        // [함수] 특정 카테고리로 필터링 이동
        function filterCategory(categoryName) {
            location.href = `product_list.html?category=${encodeURIComponent(categoryName)}`;
        }

        // [함수] 로그인 상태에 따른 헤더 버튼 제어
        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authElements = document.querySelectorAll('.auth-only');
            const guestElements = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authElements.forEach(el => el.style.display = 'inline-block');
                guestElements.forEach(el => el.style.display = 'none');
            } else {
                authElements.forEach(el => el.style.display = 'none');
                guestElements.forEach(el => el.style.display = 'inline-block');
            }
        }

        // 열 선택 기능
        function isMobile() { return window.innerWidth <= 768; }

        function setGridCols(cols) {
            const grid = document.getElementById('roomGrid');
            grid.className = grid.className.replace(/\bcols-\d+\b/, '').trim();
            grid.classList.add(`cols-${cols}`);

            const storageKey = isMobile() ? 'gridColsMobile' : 'gridColsDesktop';
            localStorage.setItem(storageKey, cols);

            document.querySelectorAll('.col-btn').forEach(btn => {
                btn.classList.toggle('active', Number(btn.dataset.cols) === cols);
            });
        }

        function initGridCols() {
            const mobile = isMobile();
            const storageKey = mobile ? 'gridColsMobile' : 'gridColsDesktop';
            const defaultCols = mobile ? 2 : 3;
            const maxMobile = 3;

            let saved = Number(localStorage.getItem(storageKey)) || defaultCols;
            if (mobile && saved > maxMobile) saved = maxMobile;

            setGridCols(saved);
        }

        // [로직] 페이지 초기 로드 처리
        document.addEventListener('DOMContentLoaded', () => {
            initGridCols();
            // 1. 헤더 불러오기
            fetch('header.html')
                .then(res => {
                    if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
                    return res.text();
                })
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    updateHeader();
                })
                .catch(err => console.error('헤더 로딩 에러:', err));

            // 2. URL 파라미터에 따른 검색창 Placeholder 변경
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            const searchTerm = urlParams.get('search'); 
            const searchInput = document.getElementById('main-search');
            const searchBtn = document.getElementById('search-btn'); // 돋보기 버튼

            if (category && searchInput) {
                searchInput.placeholder = `"${category}" 내에서 검색...`;
            }

            // 4. [추가] 검색어가 있으면 검색창에 글자 유지
    if (searchTerm && searchInput) {
        searchInput.value = searchTerm;
    }

    // 5. [이벤트 연결] 엔터키 눌렀을 때
    if (searchInput) {
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                performSearch(); // 아까 만든 공통 함수 호출
            }
        });
    }

    // 6. [이벤트 연결] 돋보기 버튼 눌렀을 때
    if (searchBtn) {
        searchBtn.addEventListener('click', () => {
            performSearch(); // 아까 만든 공통 함수 호출
        });
    }
});


function performSearch() {
    const searchInput = document.getElementById('main-search');
    if (!searchInput) return;

    const keyword = searchInput.value.trim();
    const urlParams = new URLSearchParams(window.location.search);
    const currentCat = urlParams.get('category');

    let targetUrl = `product_list.html?search=${encodeURIComponent(keyword)}`;
    if (currentCat) {
        targetUrl += `&category=${encodeURIComponent(currentCat)}`;
    }
    location.href = targetUrl;
}

        // [로직] 로그아웃 버튼 클릭 처리
        document.addEventListener('click', function (e) {
            const logoutBtn = e.target.closest('#logout-btn');
            if (logoutBtn) {
                localStorage.removeItem('isLoggedIn');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html';
            }
        });
    </script>

    <!-- 5. 모든 비즈니스 로직이 담긴 외부 JS 파일 연결 -->
    <script src="script.js"></script>

</body>

</html>
