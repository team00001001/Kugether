<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="mobile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1:1 문의하기 | KU GONGGU</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 공통 컬러 변수 */
            --ku-crimson: #8A1538;
            --text-dark: #222222;
            --bg-color: #F7F8FA;
            --surface-color: #FFFFFF;
            --border-light: #EAECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #4A5056;
            --text-tertiary: #818991;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 10px 25px rgba(0,0,0,0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-top: 100px;
            min-height: 100vh;
        }

        /* 공통 헤더 (help.html과 동일) */
        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        /* 컨테이너 및 헤더 텍스트 */
        .container {
            max-width: 700px; /* 폼이 너무 넓어지지 않도록 조절 */
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 500;
        }

        /* 문의 폼 카드 디자인 */
        .inquiry-card {
            background: var(--surface-color);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            padding: 40px;
            border: 1px solid var(--border-light);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group:last-of-type {
            margin-bottom: 32px;
        }

        .form-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        /* 필수 입력 마크 */
        .required::after {
            content: " *";
            color: var(--ku-crimson);
        }

        /* 입력 필드 공통 디자인 */
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-primary);
            background-color: #FAFAFB;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-control:focus {
            background-color: var(--surface-color);
            border-color: var(--ku-crimson);
            box-shadow: 0 0 0 3px rgba(138, 21, 56, 0.1);
        }

        .form-control::placeholder {
            color: var(--text-tertiary);
        }

        /* 텍스트 에어리어 특화 */
        textarea.form-control {
            resize: vertical;
            min-height: 200px;
            line-height: 1.6;
        }

        /* 커스텀 셀렉트 화살표 (선택적) */
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23818991' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
            cursor: pointer;
        }

        /* 제출 버튼 */
        .btn-submit {
            width: 100%;
            background-color: var(--ku-crimson);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-submit:hover {
            background-color: #72112e;
            transform: translateY(-2px);
        }

        /* ==========================================
        커스텀 드롭다운 디자인
        ========================================== */
        .custom-select {
            position: relative;
            width: 100%;
        }

        /* 닫혀있을 때 보이는 입력창 */
        .select-selected {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-light);
            border-radius: 10px; /* 기존 입력창과 동일한 둥글기 */
            font-size: 1rem;
            color: var(--text-primary);
            background-color: #FAFAFB;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        /* 우측 화살표 아이콘 */
        .select-selected::after {
            content: "";
            width: 20px;
            height: 20px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23818991' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 0.3s ease;
        }

        /* 드롭다운이 열렸을 때 화살표 180도 회전 */
        .select-selected.select-arrow-active::after {
            transform: rotate(180deg);
        }

        /* ★ 펼쳐지는 드롭다운 리스트 (이곳을 둥글게 만듭니다!) ★ */
        .select-items {
            position: absolute;
            background-color: var(--surface-color);
            top: 100%;
            left: 0;
            right: 0;
            z-index: 99;
            margin-top: 8px; /* 입력창과 살짝 띄워주기 */
            border: 1px solid var(--border-light);
            border-radius: 16px; /* 전체 리스트 모서리를 둥글게 */
            box-shadow: var(--shadow-md); /* 그림자 추가로 입체감 부여 */
            overflow: hidden; /* 내부 항목들이 둥근 모서리를 삐져나가지 않도록 숨김 */
        }

        /* 리스트 숨김 처리용 클래스 */
        .select-hide {
            display: none;
        }

        /* 드롭다운 안의 각 항목들 */
        .select-items div {
            color: var(--text-primary);
            padding: 14px 16px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s, color 0.2s;
        }

        /* 항목에 마우스 올렸을 때 (Hover) - 버건디 포인트 */
        .select-items div:hover {
            background-color: rgba(138, 21, 56, 0.05);
            color: var(--ku-crimson);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">1:1 문의하기</h1>
            <p class="page-subtitle">서비스 이용 중 불편하신 점이나 건의사항을 남겨주세요.</p>
        </div>

        <div class="inquiry-card">
            <form id="inquiryForm">
                <div class="form-group">
                <label class="form-label required">문의 유형</label>
                
                <div class="custom-select" id="customSelect">
                    <div class="select-selected">문의 유형을 선택해주세요</div>
                    <div class="select-items select-hide">
                        <div data-value="usage">공구 이용 문의</div>
                        <div data-value="account">계정 관련 문의</div>
                        <div data-value="bug">오류 신고</div>
                        <div data-value="suggestion">서비스 건의</div>
                        <div data-value="other">기타</div>
                    </div>
                </div>
    
    <input type="hidden" id="category" name="category" required>
</div>

                <div class="form-group">
                    <label for="title" class="form-label required">제목</label>
                    <input type="text" id="title" class="form-control" placeholder="문의 제목을 입력해주세요." required>
                </div>

                <div class="form-group">
                    <label for="content" class="form-label required">문의 내용</label>
                    <textarea id="content" class="form-control" placeholder="문의하실 내용을 상세히 적어주세요. (최대 1,000자)" required></textarea>
                </div>

                <button type="submit" class="btn-submit">문의 접수하기</button>
            </form>
        </div>
    </div>

    <script>
        // 1. 공통 헤더 불러오기 (help.html 로직 동일)
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html 파일을 찾을 수 없습니다.');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                updateHeader();
            })
            .catch(err => console.error(err));

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');

            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }

        // 로그아웃 이벤트 처리
        document.addEventListener('click', function(e) {
            if(e.target && e.target.id === 'logout-btn') {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userNickname');
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userId');
                alert('로그아웃 되었습니다.');
                location.href = 'main_login.html'; 
            }
        });

        // 커스텀 셀렉트 동작 로직
        const customSelect = document.getElementById("customSelect");
        const selected = customSelect.querySelector(".select-selected");
        const items = customSelect.querySelector(".select-items");
        const hiddenInput = document.getElementById("category");
        const itemDivs = items.querySelectorAll("div");

        // 1. 선택창 클릭 시 리스트 열기/닫기
        selected.addEventListener("click", function(e) {
            e.stopPropagation(); // 클릭 이벤트가 문서 전체로 퍼지는 것 방지
            items.classList.toggle("select-hide");
            this.classList.toggle("select-arrow-active");
            
            // 열렸을 때 테두리 색상 진하게 (포커스 효과)
            if (!items.classList.contains("select-hide")) {
                this.style.borderColor = "var(--ku-crimson)";
                this.style.boxShadow = "0 0 0 3px rgba(138, 21, 56, 0.1)";
            } else {
                this.style.borderColor = "var(--border-light)";
                this.style.boxShadow = "none";
            }
        });

        // 2. 리스트 항목 클릭 시 값 변경
        itemDivs.forEach(function(item) {
            item.addEventListener("click", function() {
                // 화면에 보이는 텍스트 변경
                selected.innerHTML = this.innerHTML;
                // 폼 제출을 위한 숨김 input에 값(data-value) 저장
                hiddenInput.value = this.getAttribute("data-value");
                
                // 리스트 닫고 스타일 원상복구
                items.classList.add("select-hide");
                selected.classList.remove("select-arrow-active");
                selected.style.borderColor = "var(--border-light)";
                selected.style.boxShadow = "none";
            });
        });

        // 3. 화면의 다른 빈 공간을 클릭하면 열려있던 리스트 닫기
        document.addEventListener("click", function() {
            items.classList.add("select-hide");
            selected.classList.remove("select-arrow-active");
            selected.style.borderColor = "var(--border-light)";
            selected.style.boxShadow = "none";
        });

        // 2. 폼 제출 처리
        document.getElementById('inquiryForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 페이지 새로고침 방지

            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            // 실제 개발 시에는 여기서 Python/JSON 기반 백엔드 API로 데이터를 전송합니다.
            // 예: fetch('/api/inquiry', { method: 'POST', body: JSON.stringify({ category, title, content }) })
            
            console.log("문의 접수 데이터:", { category, title, content });
            
            alert('문의가 성공적으로 접수되었습니다. 빠르게 확인 후 답변드리겠습니다.');
            location.href = 'help.html'; // 접수 후 도움말 페이지로 복귀
        });
    </script>
</body>
</html>
