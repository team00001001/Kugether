<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU GONGGU - 성공 공구 내역</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ku-crimson: #8A1538;
            --text-dark: #222222;
            --bg-color: #F8F9FA;
            --surface-color: #FFFFFF;
            --border-color: #EAECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #4A5056;
            --text-tertiary: #818991;
            --shadow-md: 0 4px 16px rgba(138, 21, 56, 0.08);
            --success-bg: #E8F5E9;
            --success-text: #2E7D32;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-top: 100px;
            min-height: 100vh;
        }

        header {
            background-color: var(--ku-crimson);
            backdrop-filter: blur(8px);
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .page-title span {
            font-size: 1rem;
            font-weight: 600;
            color: var(--ku-crimson);
            margin-left: 8px;
        }

        .product-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .product-card {
            background: var(--surface-color);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-3px);
        }

        .product-img {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            object-fit: cover;
            background-color: #eee;
        }

        .product-info {
            flex: 1;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .status-success { 
            background: var(--success-bg); 
            color: var(--success-text); 
        }

        .product-name {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
            cursor: pointer;
            text-decoration: none;
        }

        .product-meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            gap: 15px;
        }

        .manage-btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-manage {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-secondary);
            transition: 0.2s;
        }

        .btn-manage:hover {
            background: #F8F9FA;
            border-color: #ccc;
        }

        .btn-detail { 
            color: var(--ku-crimson); 
            border-color: transparent; 
            background: rgba(138, 21, 56, 0.05); 
        }

        .btn-chat { 
            color: #FFB300 !important; 
            border-color: transparent !important; 
            background: rgba(255, 179, 0, 0.05) !important; 
        }

        .btn-chat:hover {
            background: rgba(255, 179, 0, 0.2) !important;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            display: none;
        }

        .empty-state p {
            color: var(--text-tertiary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .btn-main {
            display: inline-block;
            background: var(--ku-crimson);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
    <link rel="stylesheet" href="./mobile.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">성공 공구 내역 <span id="count-badge">0</span></h1>
        </div>
        
        <div id="product-list" class="product-list">
            </div>

        <div id="empty-view" class="empty-state">
            <p>아직 성공한 공구 내역이 없습니다.<br>진행 중인 공구에 참여하여 목표를 달성해보세요!</p>
            <a href="main_login.html" class="btn-main">홈으로 가기</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. 헤더 불러오기
            fetch('header.html')
                .then(res => res.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    updateHeader();
                });

            const listContainer = document.getElementById('product-list');
            const emptyView = document.getElementById('empty-view');
            const countBadge = document.getElementById('count-badge');
            const myId = localStorage.getItem('userId'); 

            if (!myId) {
                alert("로그인이 필요합니다.");
                location.href = 'main_login.html';
                return;
            }

            try {
                // 2. 백엔드에서 데이터 불러오기 (참여 내역 + 전체 공구)
                const [chatsRes, productsRes] = await Promise.all([
                    fetch(`http://localhost:3000/chats/my/${myId}`),
                    fetch('http://localhost:3000/products')
                ]);

                const chats = await chatsRes.json();
                const allProducts = await productsRes.json();

                const joinedIds = chats.map(c => String(c.product_id));
                const myCreatedIds = allProducts.filter(p => String(p.user_id) === String(myId)).map(p => String(p.id));

                // 3. 필터링: 내가 올렸거나 참여했으며, 목표 인원을 채운 공구
                const successProducts = allProducts.filter(p => {
                    const isMineOrJoined = joinedIds.includes(String(p.id)) || myCreatedIds.includes(String(p.id));
                    const isSuccess = p.currentCount >= p.targetCount;
                    return isMineOrJoined && isSuccess;
                }).sort((a, b) => b.id - a.id); // 최신순 정렬
                
                countBadge.innerText = successProducts.length;

                // 4. 화면 렌더링
                if (successProducts.length === 0) {
                    emptyView.style.display = 'block';
                } else {
                    emptyView.style.display = 'none';
                    successProducts.forEach(product => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        
                        card.innerHTML = `
                            <img src="${product.imageUrl || 'https://via.placeholder.com/100'}" alt="상품" class="product-img">
                            <div class="product-info">
                                <span class="status-badge status-success">공구 성공</span>
                                <a href="product.html?id=${product.id}" class="product-name" style="display:block;">${product.title}</a>
                                <div class="product-meta">
                                    <span>📍 ${product.location || '교내'}</span>
                                    <span>💰 ${Number(product.price).toLocaleString()}원</span>
                                    <span style="color: var(--text-dark); font-weight: 600;">👥 ${product.currentCount} / ${product.targetCount}명</span>
                                </div>
                            </div>
                            <div class="manage-btns">
                                <a href="product.html?id=${product.id}" class="btn-manage btn-detail">상세보기</a>
                                <a href="direct_chattings.html?id=${product.id}" class="btn-manage btn-chat">채팅방</a>
                            </div>
                        `;
                        listContainer.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('데이터 로드 실패:', error);
                listContainer.innerHTML = '<p style="text-align:center; color:#999; padding: 40px 0;">내역을 불러오는 중 오류가 발생했습니다.</p>';
            }
        });

        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authButtons = document.querySelectorAll('.auth-only');
            const guestButtons = document.querySelectorAll('.guest-only');
            if (isLoggedIn) {
                authButtons.forEach(btn => btn.style.display = 'inline-block');
                guestButtons.forEach(btn => btn.style.display = 'none');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
                guestButtons.forEach(btn => btn.style.display = 'inline-block');
            }
        }
    </script>
</body>
</html>
