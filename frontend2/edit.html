<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공동구매 글 수정 | KU GONGGU</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquareRound@1.0/nanumsquareround.css">
    <link rel="stylesheet" href="css/edit.css">
    <link rel="stylesheet" href="css_mobile/edit_mobile.css" media="(max-width: 768px)">
    <style>
        .info-text {
            font-size: 0.85rem;
            color: #888;
            font-weight: normal;
            margin-left: 8px;
        }
        .time-display {
            font-size: 0.9rem;
            color: #ff5a5a;
            margin-top: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <a href="javascript:history.back()" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <div class="header-title">공고 글 수정하기</div>
    </header>

    <main>
        <form class="write-form" id="edit-form">
            <div class="input-group">
                <label for="category" class="required">카테고리 선택</label>
                <select id="category" name="category">
                    <option value="food">🍊 식재료 / 배달</option>
                    <option value="living">🧴 자취 / 생필품</option>
                    <option value="study">📚 전공 / 문구</option>
                    <option value="etc">📦 기타 물품</option>
                </select>
            </div>

            <div class="input-group">
                <label for="productName" class="required">상품명</label>
                <input type="text" id="productName" placeholder="예) 유기농 햇감자 3kg 나눌 분!" required>
            </div>
            
            <div class="input-group short-input">
                <label for="people" class="required">모집 인원 (본인 포함)</label>
                <input type="number" id="people" placeholder="예) 5" min="2" required>
            </div>

            <div class="input-group short-input">
                <label for="price" class="required">1인당 예상 가격 (원)</label>
                <input type="number" id="price" placeholder="예) 8500" required>
            </div>

            <div class="input-group">
                <label for="periodValue" class="required">모집 기간 변경 (최대 1년)</label>
                <div style="width: 100%; display: flex; gap: 0.5rem;">
                    <input type="number" id="periodValue" placeholder="예) 3" min="0" value="0" required style="flex: 1;">
                    <select id="periodUnit" style="flex: 1;">
                        <option value="minute">분</option>
                        <option value="hour">시간</option>
                        <option value="day" selected>일</option>
                        <option value="month">개월</option>
                    </select>
                    <select id="periodAction" style="flex: 1;">
                        <option value="extend">연장</option>
                        <option value="shorten">단축</option>
                    </select>
                </div>
                <div id="remaining-time-display" class="time-display">현재 남은 시간: 불러오는 중...</div>
            </div>

            <div class="input-group">
                <label for="location" class="required">수령/배분 장소</label>
                <input type="text" id="location" placeholder="예) 정보관 1층 라운지" required>
            </div>

            <div class="input-group">
                <label for="productUrl">상품 URL <span class="info-text">(온라인 구매 상품인 경우 작성)</span></label>
                <input type="url" id="productUrl" placeholder="예) https://...">
            </div>

            <div class="input-group">
                <label for="imageUrl">상품 이미지 URL (선택)</label>
                <input type="url" id="imageUrl" placeholder="예) https://...">
            </div>

            <div class="input-group">
                <label for="description" class="required">상세 설명</label>
                <textarea id="description" placeholder="어떤 상품인지, 왜 같이 사고 싶은지 자세히 적어주세요!" required></textarea>
            </div>

            <button type="submit" class="submit-btn">수정 완료하기</button>
        </form>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            alert('잘못된 접근입니다.');
            location.href = 'my_products.html'; 
        }

        let currentExpireAt = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(`https://campusgonggu-production.up.railway.app/products/${productId}`);
                if (!response.ok) throw new Error('상품 정보를 불러오지 못했습니다.');
                
                const product = await response.json();

                const myUserId = localStorage.getItem('userId');
                if (product.user_id != myUserId) {
                    alert('수정 권한이 없습니다.');
                    location.href = 'my_products.html';
                    return;
                }

                const nowSec = Math.floor(Date.now() / 1000);
                const isClosed = product.isClosed || product.currentCount >= product.targetCount || Number(product.duration) <= nowSec;
                if (isClosed) {
                    alert('이미 마감된 공고는 수정할 수 없습니다.');
                    location.href = `product.html?id=${productId}`;
                    return;
                }

                document.getElementById('productName').value = product.title;
                document.getElementById('people').value = product.targetCount;
                document.getElementById('price').value = product.price;
                document.getElementById('location').value = product.location;
                document.getElementById('productUrl').value = product.productUrl || '';
                document.getElementById('imageUrl').value = product.imageUrl || '';
                document.getElementById('description').value = product.description;

                const categoryReverseMap = {
                    '식재료 / 배달': 'food',
                    '자취 / 생필품': 'living',
                    '전공 / 문구': 'study',
                    '기타 물품': 'etc'
                };
                if (categoryReverseMap[product.category]) {
                    document.getElementById('category').value = categoryReverseMap[product.category];
                }

                currentExpireAt = Number(product.duration);
                const diffSec = currentExpireAt - nowSec;
                
                const timeDisplay = document.getElementById('remaining-time-display');
                if (diffSec <= 0) {
                    timeDisplay.textContent = '현재 남은 시간: 마감됨';
                    timeDisplay.style.color = '#888';
                } else {
                    const days = Math.floor(diffSec / 86400);
                    const hours = Math.floor((diffSec % 86400) / 3600);
                    const mins = Math.floor((diffSec % 3600) / 60);
                    timeDisplay.textContent = `현재 남은 시간: ${days}일 ${hours}시간 ${mins}분`;
                }

            } catch (error) {
                console.error(error);
                alert('서버 연결 실패. 백엔드 서버가 켜져 있는지 확인해주세요.');
            }
        });

        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const categoryMap = {
                food: '식재료 / 배달',
                living: '자취 / 생필품',
                study: '전공 / 문구',
                etc: '기타 물품'
            };

            const pValue = Number(document.getElementById('periodValue').value);
            const pUnit = document.getElementById('periodUnit').value; 
            const pAction = document.getElementById('periodAction').value;

            const nowSec = Math.floor(Date.now() / 1000);
            
            let baseTime = currentExpireAt < nowSec ? nowSec : currentExpireAt;
            let baseDate = new Date(baseTime * 1000);

            if (pAction === 'shorten') {
                if (pUnit === 'minute') baseDate.setMinutes(baseDate.getMinutes() - pValue);
                else if (pUnit === 'hour') baseDate.setHours(baseDate.getHours() - pValue);
                else if (pUnit === 'day') baseDate.setDate(baseDate.getDate() - pValue);
                else if (pUnit === 'month') {
                    baseDate.setMonth(baseDate.getMonth() - pValue);
                    // 단축할 때도 똑같이 하루 빼기 적용
                    if (pValue > 0) baseDate.setDate(baseDate.getDate() - 1); 
                }

            } else if (pAction === 'extend') {
                if (pUnit === 'minute') baseDate.setMinutes(baseDate.getMinutes() + pValue);
                else if (pUnit === 'hour') baseDate.setHours(baseDate.getHours() + pValue);
                else if (pUnit === 'day') baseDate.setDate(baseDate.getDate() + pValue);
                else if (pUnit === 'month') {
                    // 정확한 달력 계산 후
                    baseDate.setMonth(baseDate.getMonth() + pValue);
                    // ✅ 요청하신 대로 '딱 하루만' 빼는 코드 복구!
                    if (pValue > 0) baseDate.setDate(baseDate.getDate() - 1); 
                }
            }

            let newExpireAt = Math.floor(baseDate.getTime() / 1000);

            if (pAction === 'shorten' && newExpireAt < nowSec && pValue !== 0) {
                alert('단축하려는 시간이 현재 남은 시간보다 큽니다. 더 적게 입력해주세요.');
                return;
            }
            const oneYearSec = 365 * 86400;
            if (pAction === 'extend' && (newExpireAt - nowSec) > oneYearSec) {
                alert('총 모집 기간은 현재 시점부터 최대 1년을 초과할 수 없습니다.');
                return;
            }

            const updatedData = {
                title: document.getElementById('productName').value,
                category: categoryMap[document.getElementById('category').value],
                targetCount: Number(document.getElementById('people').value),
                price: Number(document.getElementById('price').value),
                duration: newExpireAt, 
                location: document.getElementById('location').value,
                productUrl: document.getElementById('productUrl').value || '',
                imageUrl: document.getElementById('imageUrl').value,
                description: document.getElementById('description').value,
                user_id: localStorage.getItem('userId')
            };

            try {
                const response = await fetch(`https://campusgonggu-production.up.railway.app/products/${productId}`, {
                    method: 'PUT', 
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });

                if (!response.ok) {
                    const result = await response.json();
                    alert(result.error || '수정 실패');
                    return;
                }

                alert('수정이 완료되었습니다!');
                location.href = `product.html?id=${productId}`;

            } catch (error) {
                console.error(error);
                alert('서버 에러가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
