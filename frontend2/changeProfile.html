<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>프로필 수정 | KUgether</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/changeProfile.css">
    <link rel="stylesheet" href="css_mobile/changeProfile_mobile.css" media="(max-width: 768px)">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container">
        <h1 class="page-title">프로필 설정</h1>

        <div class="card">
            <h2 class="section-title">기본 정보</h2>
            
            <div class="form-group">
                <label>학교 이메일 (인증됨)</label>
                <input type="text" id="user-email" value="loading..." disabled>
            </div>

            <div class="form-group">
                <label>닉네임</label>
                <div class="input-row">
                    <input type="text" id="user-nickname" placeholder="새로운 닉네임 입력">
                    <button class="btn btn-primary" onclick="updateNickname()">변경하기</button>
                </div>
                <div class="helper-text">⚠️ 참여 중인 공구가 있을 경우 닉네임 변경이 제한됩니다.</div>
            </div>
        </div>

        <div class="card">
            <h2 class="section-title">비밀번호 변경</h2>
            <div class="form-group">
                <label>현재 비밀번호</label>
                <input type="password" id="current-password" placeholder="현재 비밀번호 입력">

            </div>
            <div class="form-group">
                <label>새 비밀번호</label>
                <input type="password" id="new-password" placeholder="새 비밀번호 입력">

            </div>
            <div class="form-group">
                <label>새 비밀번호 확인</label>
                <input type="password" id="confirm-password" placeholder="새 비밀번호 다시 입력">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="updatePassword()">비밀번호 변경</button>
        </div>

        <div class="card" style="margin-bottom: 80px;">
            <h2 class="section-title" style="color: var(--danger-color); border-bottom-color: #FFEBEE;">위험 구역</h2>
            <p style="font-size: 0.9rem; color: var(--text-sub); margin-bottom: 15px; line-height: 1.5;">
                탈퇴 시 모든 데이터가 삭제되며 복구할 수 없습니다.<br>
                진행 중인 공구가 있다면 정산 완료 후 탈퇴가 가능합니다.
            </p>
            <button class="btn btn-danger" onclick="deleteAccount()">회원 탈퇴</button>
        </div>

    </div>

    <script>
        // 🚨 1. 알림 배지 업데이트 함수 추가
    async function updateHeaderNotificationBadge() {
        const userId = localStorage.getItem('userId');
        const badge = document.querySelector('.noti-badge');
        if (!badge || !userId) return;
        try {
            const res = await fetch(`https://campusgonggu-production.up.railway.app/notifications/${userId}`);
            const notifications = await res.json();
            const hasUnread = notifications.some(n => Number(n.is_read) === 0);
            badge.style.display = hasUnread ? 'block' : 'none';
        } catch (err) {
            badge.style.display = 'none';
        }
    }

    // 🚨 DOM이 로드된 후 실행되도록 통합 (joined_products.html 스타일 적용)
    document.addEventListener('DOMContentLoaded', () => {
        // 1. 페이지 로드 시 사용자 정보 세팅
        document.getElementById('user-email').value = localStorage.getItem('userEmail') || '';
        document.getElementById('user-nickname').value = localStorage.getItem('userNickname') || '';

        // 2. 헤더 파일 불러오기 로직
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('header.html을 찾을 수 없습니다.');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                
                // 헤더 UI 업데이트 및 알림 배지 로드
                updateHeader();
                updateHeaderNotificationBadge();
                
                // 로그아웃 버튼 이벤트 연결 추가 (매우 중요)
                const logoutBtn = document.getElementById('logout-btn');
                if (logoutBtn) {
                    logoutBtn.onclick = function() {
                        if (confirm('로그아웃 하시겠습니까?')) {
                            localStorage.removeItem('userId');
                            localStorage.removeItem('isLoggedIn');
                            alert('로그아웃 되었습니다.');
                            location.href = 'main_login.html';
                        }
                    };
                }
            })
            .catch(err => console.error(err));
    });

    function updateHeader() {
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        const authButtons = document.querySelectorAll('.auth-only');
        const guestButtons = document.querySelectorAll('.guest-only');

        if (isLoggedIn) {
            authButtons.forEach(btn => btn.style.display = 'inline-block');
            guestButtons.forEach(btn => btn.style.display = 'none');
        } else {
            // 비로그인 상태일 경우 로그인 페이지로 리다이렉트
            location.href = 'login.html';
        }
    }

        // 닉네임 변경 함수
        async function updateNickname() {
    const userId = localStorage.getItem('userId');
    const newNick = document.getElementById('user-nickname').value;

    if (!userId) {
        alert('로그인이 필요합니다.');
        location.href = 'login.html';
        return;
    }

    if (!newNick.trim()) {
        alert("변경할 닉네임을 입력해주세요.");
        return;
    }

    const response = await fetch(`https://campusgonggu-production.up.railway.app/users/${userId}/nickname`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            nickname: newNick
        })
    });

    const result = await response.json();

    if (!response.ok) {
        alert(result.message || '닉네임 변경 실패');
        return;
    }

    localStorage.setItem('userNickname', newNick);
    alert("닉네임이 성공적으로 변경되었습니다.");
}

        // 비밀번호 변경 함수
        async function updatePassword() {
    const userId = localStorage.getItem('userId');

    const currentPassword =
        document.getElementById('current-password').value;

    const newPassword =
        document.getElementById('new-password').value;

    const confirmPassword =
        document.getElementById('confirm-password').value;

    if (!currentPassword || !newPassword || !confirmPassword) {
        alert('모든 비밀번호 칸을 입력해주세요.');
        return;
    }

    if (newPassword !== confirmPassword) {
        alert('새 비밀번호가 일치하지 않습니다.');
        return;
    }

    const response = await fetch(
        `https://campusgonggu-production.up.railway.app/users/${userId}/password`,
        {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                currentPassword,
                newPassword
            })
        }
    );

    const result = await response.json();

    if (!response.ok) {
        alert(result.message || '비밀번호 변경 실패');
        return;
    }

    alert('비밀번호가 변경되었습니다. 다시 로그인해주세요.');

    localStorage.clear();

    location.href = 'login.html';
}

      async function deleteAccount() {
    const userId = localStorage.getItem('userId');

    if (!userId) {
        alert('로그인이 필요합니다.');
        return;
    }

    const ok = confirm(
        "정말로 탈퇴하시겠습니까? 활동 내역이 모두 삭제되며 복구할 수 없습니다."
    );

    if (!ok) return;

    try {

        const response = await fetch(
            `https://campusgonggu-production.up.railway.app/users/${userId}`,
            {
                method: 'DELETE'
            }
        );

        const result = await response.json();

        if (!response.ok) {
            alert(result.message || '회원 탈퇴 실패');
            return;
        }

        alert('회원 탈퇴가 완료되었습니다.');

        localStorage.clear();

        location.href = 'main_login.html';

    } catch (error) {

        console.log(error);

        alert('서버 연결 오류');

    }
}
    </script>
</body>
</html>
