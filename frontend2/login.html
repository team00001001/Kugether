<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - KUgether</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css_mobile/login_mobile.css" media="(max-width: 768px)">
</head>
<body>

    <div class="login-container">
        <h2>LOGIN</h2>
        <form id="login-form">
            <div class="form-group">
                <label>학교 이메일</label>
                <div class="email-input-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                    <input type="text" id="user-id" placeholder="이메일 아이디" required style="flex: 1;">
                    <span style="font-weight: 600; color: #555;">@ korea.ac.kr</span>
                </div>
            </div>

            <div class="form-group">
                <label for="user-pw">비밀번호</label>
                <input type="password" id="user-pw" placeholder="비밀번호 입력" required>
            </div>
            
            <button type="button" class="btn" onclick="loginToServer()">로그인</button>
        </form>

        <button type="button" class="btn btn-signup" onclick="location.href='signup.html'">회원가입</button>

        <div class="options">
            <a href="forgotPw.html">비밀번호를 잊으셨나요?</a>
        </div>
    </div>

    <script>
        // ✅ 고정된 도메인 설정
        const FIXED_DOMAIN = 'korea.ac.kr';

        async function loginToServer() {
            const emailId = document.getElementById('user-id').value.trim();
            const password = document.getElementById('user-pw').value.trim();
            
            // 빈 값 체크
            if (!emailId || !password) {
                alert("이메일 아이디와 비밀번호를 모두 입력해주세요.");
                return;
            }

            // 입력된 아이디와 고정된 도메인을 합쳐서 전체 이메일 생성
            const fullEmail = `${emailId}@${FIXED_DOMAIN}`; 

            try {
                // 🚀 백엔드 서버(auth.js)와 통신
                const response = await fetch('https://campusgonggu-production.up.railway.app/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: fullEmail, 
                        password: password 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`${data.nickname}님 환영합니다!`);
                    
                    // ⭐ [중요] 나중에 공구 페이지에서 작성자/참여자 구분을 위해 로컬스토리지 저장
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userNickname', data.nickname); // 내 닉네임 저장
                    localStorage.setItem('userEmail', fullEmail);       // 내 고유 ID 저장
                    localStorage.setItem('userId', data.userId);
                    
                    // 메인 페이지로 이동
                    location.href = 'main_login.html'; 
                } else {
                    // 서버에서 보낸 에러 메시지 (비번 틀림 등)
                    alert(data.message);
                }
            } catch (error) {
                console.error("서버 통신 에러:", error);
                alert("서버와 연결할 수 없습니다. 백엔드(server.js)가 켜져 있는지 확인하세요!");
            }
        }
    </script>
</body>
</html>
